kind = "web"
previewPath = "/commercial-video/"
title = "Mosaic Beats Commercial"
version = "1.0.0"
id = "artifacts/commercial-video"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/commercial-video/" ]
localPort = 22139

[services.development]
run = "pnpm --filter @workspace/commercial-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/commercial-video", "run", "build" ]
publicDir = "artifacts/commercial-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22139"
BASE_PATH = "/commercial-video/"

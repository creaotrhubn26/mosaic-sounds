kind = "web"
previewPath = "/dj-dashboard/"
title = "DJ Dashboard"
version = "1.0.0"
id = "artifacts/dj-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dj-dashboard/" ]
localPort = 19966

[services.development]
run = "pnpm --filter @workspace/dj-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dj-dashboard", "run", "build" ]
publicDir = "artifacts/dj-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19966"
BASE_PATH = "/dj-dashboard/"
